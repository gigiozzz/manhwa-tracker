<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manhwa Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#87ceeb;--sky2:#b8e8f8;--teal:#1D9E75;--teal2:#5DCAA5;
  --amber:#BA7517;--amber2:#FAC775;--warm:#e8c084;--warm2:#f5dfa8;
  --coral:#D85A30;--coral2:#F0997B;--green:#3B6D11;--green2:#97C459;
  --cream:#faf6ed;--paper:#f0e8d0;--mist:#e8f6f8;
  --deep:#1a2e3a;--deep2:#2a4a5e;--ink:#1a2830;--muted:#5a6e7a;
  --card:#ffffffcc;--card2:#f8f4eadd;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--deep);color:var(--ink);min-height:100vh;overflow-x:hidden;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(20,40,50,0.88);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(29,158,117,0.3);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.4rem;height:56px;gap:.75rem;}
.nav-logo{font-family:'Cinzel',serif;font-size:16px;font-weight:900;
  color:var(--amber2);letter-spacing:3px;text-transform:uppercase;white-space:nowrap;}
.nav-logo span{color:var(--cream);font-weight:400;}
.nav-links{display:flex;gap:3px;}
.nav-btn{background:none;border:1px solid transparent;
  color:rgba(250,246,237,0.65);font-family:'Rajdhani',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 11px;border-radius:4px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.nav-btn:hover{color:var(--amber2);border-color:rgba(250,199,117,0.4);}
.nav-btn.active{color:var(--amber2);border-color:var(--amber2);background:rgba(250,199,117,0.12);}
.nav-update{background:rgba(29,158,117,0.15);border:1px solid rgba(29,158,117,0.55);
  color:var(--teal2);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:4px;
  cursor:pointer;transition:all .2s;white-space:nowrap;}
.nav-update:hover{background:rgba(29,158,117,0.3);color:var(--cream);}

.page{display:none;min-height:100vh;padding-top:56px;}
.page.active{display:block;}

/* HOME */
.hero{
  min-height:100vh;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;
}
.hero-bg{
  position:absolute;inset:0;
  background:var(--bg-url) center/cover no-repeat;
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(10,28,38,0.45) 0%,
    rgba(10,28,38,0.25) 40%,
    rgba(10,28,38,0.60) 80%,
    rgba(10,28,38,0.85) 100%
  );
}
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(100vh);opacity:0;}10%{opacity:.7;}90%{opacity:.3;}100%{transform:translateY(-10vh) translateX(var(--drift));opacity:0;}}
.hero-content{position:relative;z-index:2;}
.hero-title{font-family:'Cinzel',serif;font-size:clamp(2.8rem,7vw,5.5rem);font-weight:900;line-height:1;animation:fadeInUp 1s ease both;}
.hero-title .line1{color:var(--cream);display:block;text-shadow:0 2px 20px rgba(0,0,0,0.5);}
.hero-title .line2{color:var(--amber2);display:block;font-size:.5em;letter-spacing:.3em;margin-top:.35em;text-shadow:0 2px 12px rgba(0,0,0,0.4);}
.hero-sub{margin-top:1.5rem;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:rgba(250,246,237,0.6);animation:fadeInUp 1s .3s ease both;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.hero-stats{display:flex;gap:2.5rem;margin-top:3rem;animation:fadeInUp 1s .5s ease both;}
.hero-stat{text-align:center;
  background:rgba(250,246,237,0.1);backdrop-filter:blur(8px);
  border:1px solid rgba(250,246,237,0.2);border-radius:12px;padding:.8rem 1.5rem;}
.hero-stat-num{font-family:'Cinzel',serif;font-size:2.2rem;font-weight:900;color:var(--amber2);line-height:1;}
.hero-stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(250,246,237,0.55);margin-top:4px;}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:rgba(250,246,237,0.4);font-size:11px;letter-spacing:2px;text-transform:uppercase;
  animation:bounce 2s ease-in-out infinite;z-index:2;}
.scroll-hint::after{content:'';display:block;width:1px;height:40px;background:linear-gradient(to bottom,rgba(250,199,117,.6),transparent);}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}
.recent-strip{background:rgba(250,246,237,0.06);backdrop-filter:blur(10px);
  border-top:1px solid rgba(250,246,237,0.12);padding:1.5rem 2rem;
  position:relative;z-index:2;}
.recent-strip h2{font-family:'Cinzel',serif;font-size:10px;font-weight:600;
  letter-spacing:4px;text-transform:uppercase;color:var(--amber2);margin-bottom:1.2rem;}
.recent-scroll{display:flex;gap:1rem;overflow-x:auto;padding-bottom:8px;scrollbar-width:thin;scrollbar-color:rgba(29,158,117,.3) transparent;}
.recent-item{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .2s;}
.recent-item:hover{transform:translateY(-4px);}
.recent-cover{width:56px;height:80px;border-radius:5px;overflow:hidden;border:1px solid rgba(250,199,117,.35);background:#1a2e3a;position:relative;}
.recent-cover img{width:100%;height:100%;object-fit:cover;}
.no-cover-mini{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;}
.recent-ch{font-size:11px;font-weight:700;color:var(--amber2);letter-spacing:1px;}
.new-badge{position:absolute;top:2px;right:2px;background:var(--coral);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;}

/* READING */
#reading{background:#e8f4f0;padding-bottom:4rem;}
.page-header{padding:3rem 2rem 2rem;border-bottom:1px solid rgba(29,158,117,.2);
  display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;
  background:linear-gradient(135deg,#dff2eb 0%,#e8f6f0 100%);}
.page-header h1{font-family:'Cinzel',serif;font-size:2rem;font-weight:900;color:var(--deep);}
.page-header h1 span{color:var(--teal);}
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;}
.filter-btn{background:transparent;border:1px solid rgba(29,158,117,.35);color:var(--muted);
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;padding:5px 14px;border-radius:3px;cursor:pointer;transition:all .2s;}
.filter-btn.active,.filter-btn:hover{background:rgba(29,158,117,.12);border-color:var(--teal);color:var(--teal);}
.manhwa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.5rem;padding:2rem;}
.manhwa-card{background:var(--card);border:1px solid rgba(29,158,117,.18);border-radius:10px;
  overflow:hidden;transition:transform .25s,box-shadow .25s;position:relative;
  box-shadow:0 2px 12px rgba(0,0,0,.06);}
.manhwa-card:hover{transform:translateY(-5px);box-shadow:0 12px 35px rgba(29,158,117,.15);}
.manhwa-card.hiatus{opacity:.7;}
.card-cover{height:255px;position:relative;background:#d4ede4;overflow:hidden;cursor:pointer;}
.card-cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:flex-end;
  justify-content:center;padding-bottom:12px;font-family:'Rajdhani',sans-serif;font-size:12px;
  font-weight:700;letter-spacing:2px;text-transform:uppercase;color:transparent;transition:all .25s;z-index:3;}
.card-cover:hover .card-cover-overlay{background:rgba(10,28,38,.35);color:var(--amber2);}
.card-cover img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.manhwa-card:hover .card-cover img{transform:scale(1.04);}
.cover-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;font-size:2.5rem;background:linear-gradient(135deg,#c8e8d8,#a8d8c0);}
.cover-placeholder span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;
  color:rgba(26,78,58,.5);text-transform:uppercase;text-align:center;padding:0 1rem;}
.unread-badge{position:absolute;top:8px;left:8px;background:var(--coral);color:#fff;
  font-size:11px;font-weight:700;padding:3px 8px;border-radius:3px;z-index:4;}
.day-badge{position:absolute;top:8px;right:8px;background:rgba(250,246,237,.88);
  color:var(--teal);font-size:9px;font-weight:700;padding:3px 7px;border-radius:3px;
  letter-spacing:1px;border:1px solid rgba(29,158,117,.3);z-index:4;}
.card-body{padding:12px;background:var(--card2);}
.card-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--ink);
  line-height:1.3;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;min-height:2.6em;}
.card-chapters{display:flex;gap:5px;flex-direction:column;margin-bottom:10px;}
.ch-row{display:flex;justify-content:space-between;align-items:center;}
.ch-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.ch-num{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--teal);}
.ch-num.read{color:var(--muted);}
.ch-progress{height:3px;background:rgba(29,158,117,.15);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.ch-progress-bar{height:100%;background:linear-gradient(to right,var(--teal2),var(--teal));border-radius:2px;transition:width .4s;}
.card-actions{display:flex;gap:5px;}
.card-btn{flex:1;background:rgba(29,158,117,.08);border:1px solid rgba(29,158,117,.2);
  color:var(--teal);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.8px;text-transform:uppercase;padding:5px 4px;border-radius:3px;
  cursor:pointer;transition:all .2s;text-align:center;}
.card-btn:hover{background:rgba(29,158,117,.18);border-color:var(--teal);}
.card-btn.pause{background:rgba(216,90,48,.07);border-color:rgba(216,90,48,.2);color:var(--coral);}
.card-btn.pause:hover{background:rgba(216,90,48,.15);}
.add-btn{background:rgba(29,158,117,.07);border:1.5px dashed rgba(29,158,117,.3);
  border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:200px;cursor:pointer;color:rgba(29,158,117,.5);font-family:'Cinzel',serif;
  font-size:12px;letter-spacing:2px;text-transform:uppercase;gap:8px;transition:all .2s;}
.add-btn:hover{background:rgba(29,158,117,.14);color:var(--teal);border-color:var(--teal);}

/* CALENDARIO */
#calendario{background:#e8f0ea;padding-bottom:4rem;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;
  margin:1.5rem 2rem;background:rgba(29,158,117,.12);border:1px solid rgba(29,158,117,.12);
  border-radius:8px;overflow:hidden;}
.cal-day{background:#f4f9f6;padding:.75rem .5rem;min-height:120px;}
.cal-day-name{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--teal);margin-bottom:.75rem;padding-bottom:.5rem;
  border-bottom:1px solid rgba(29,158,117,.2);text-align:center;}
.cal-card{display:flex;align-items:center;gap:5px;background:rgba(29,158,117,.07);
  border:1px solid rgba(29,158,117,.15);border-radius:4px;padding:4px 5px;margin-bottom:4px;
  cursor:pointer;transition:all .2s;}
.cal-card:hover{background:rgba(29,158,117,.15);border-color:var(--teal2);}
.cal-mini-cover{width:22px;height:31px;border-radius:2px;overflow:hidden;flex-shrink:0;background:#c8e8d8;}
.cal-mini-cover img{width:100%;height:100%;object-fit:cover;}
.cal-card-title{font-size:10px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-card-ch{font-size:9px;color:var(--teal);font-family:'Cinzel',serif;}

/* SOSPESI */
#sospesi{background:#f4f0e8;padding-bottom:4rem;}
.sospesi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;padding:2rem;}
.sospesi-card{background:var(--card);border:1px solid rgba(216,90,48,.2);border-radius:8px;
  display:flex;gap:1rem;padding:1rem;align-items:flex-start;transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.05);}
.sospesi-card:hover{border-color:rgba(29,158,117,.4);}
.sospesi-cover{width:60px;height:85px;flex-shrink:0;border-radius:5px;overflow:hidden;
  border:1px solid rgba(29,158,117,.2);background:#d4ede4;cursor:pointer;}
.sospesi-cover img{width:100%;height:100%;object-fit:cover;}
.sospesi-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.sospesi-meta{font-size:12px;color:var(--muted);margin-bottom:4px;}
.status-pill{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;padding:3px 10px;border-radius:3px;margin-bottom:8px;}
.status-pill.hiatus{background:rgba(216,90,48,.12);color:var(--coral);border:1px solid rgba(216,90,48,.3);}
.status-pill.completed{background:rgba(59,109,17,.1);color:var(--green);border:1px solid rgba(59,109,17,.25);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(10,28,38,.75);align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--cream);border:1px solid rgba(29,158,117,.25);border-radius:14px;
  width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:2rem;animation:modalIn .25s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:none;}}
.modal h2{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--teal);
  margin-bottom:1.5rem;letter-spacing:1px;padding-bottom:.75rem;border-bottom:1px solid rgba(29,158,117,.2);}
.modal-field{margin-bottom:1rem;}
.modal-field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;background:#fff;
  border:1px solid rgba(29,158,117,.25);color:var(--ink);font-family:'Rajdhani',sans-serif;
  font-size:15px;padding:8px 12px;border-radius:5px;outline:none;transition:border-color .2s;}
.modal-field input:focus,.modal-field select:focus{border-color:var(--teal);}
.modal-field select option{background:#fff;color:var(--ink);}
.modal-actions{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem;}
.btn-primary{background:var(--teal);color:#fff;border:none;font-family:'Rajdhani',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:9px 24px;border-radius:5px;cursor:pointer;transition:all .2s;}
.btn-primary:hover{background:var(--teal2);color:var(--ink);}
.btn-secondary{background:transparent;border:1px solid rgba(29,158,117,.3);color:var(--muted);
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;padding:9px 20px;border-radius:5px;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{border-color:var(--teal);color:var(--teal);}
.link-pill{background:rgba(29,158,117,.08);border:1px solid rgba(29,158,117,.2);
  color:var(--teal);font-size:12px;padding:3px 10px;border-radius:3px;cursor:pointer;transition:all .2s;display:inline-block;margin:2px;}
.link-pill:hover{background:rgba(29,158,117,.18);}
.link-pill.del{color:var(--coral);border-color:rgba(216,90,48,.2);}
.link-pill.del:hover{background:rgba(216,90,48,.1);}

/* BULK UPDATE MODAL */
.bulk-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:5px;
  margin-bottom:3px;background:rgba(29,158,117,.04);border:1px solid rgba(29,158,117,.1);transition:background .2s;}
.bulk-row.updated{background:rgba(59,109,17,.08);border-color:rgba(59,109,17,.25);}
.bulk-row.failed{background:rgba(186,117,23,.08);border-color:rgba(186,117,23,.2);}
.bulk-mini-cover{width:28px;height:40px;border-radius:3px;overflow:hidden;flex-shrink:0;background:#c8e8d8;}
.bulk-mini-cover img{width:100%;height:100%;object-fit:cover;}
.bulk-title{flex:1;font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bulk-status{font-size:11px;font-weight:700;flex-shrink:0;min-width:80px;text-align:right;}
.bulk-status.ok{color:var(--green);}
.bulk-status.fail{color:var(--amber);}
.bulk-status.spin{color:var(--teal);}
.bulk-ch-input{width:66px;background:#fff;border:1px solid rgba(29,158,117,.25);color:var(--ink);
  font-family:'Cinzel',serif;font-size:13px;padding:4px 8px;border-radius:3px;text-align:center;}
.bulk-ch-input:focus{outline:none;border-color:var(--teal);}
.bulk-ch-input.changed{border-color:var(--green);background:rgba(59,109,17,.06);}
.progress-bar-wrap{height:4px;background:rgba(29,158,117,.15);border-radius:2px;margin:.75rem 0 .5rem;}
.progress-bar-fill{height:100%;background:var(--teal2);border-radius:2px;transition:width .4s;}
.bulk-summary{font-size:12px;color:var(--muted);margin-bottom:.75rem;}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--teal);color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;padding:10px 24px;border-radius:5px;
  z-index:999;transition:transform .3s ease;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(29,158,117,.3);border-radius:3px;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">MANHWA<span>TRACKER</span></div>
  <div class="nav-links">
    <button class="nav-btn active" onclick="showPage('home')">Home</button>
    <button class="nav-btn" onclick="showPage('reading')">Reading</button>
    <button class="nav-btn" onclick="showPage('calendario')">Calendario</button>
    <button class="nav-btn" onclick="showPage('sospesi')">Sospesi</button>
  </div>
  <button class="nav-update" onclick="openBulkUpdate()">⟳ Aggiorna Capitoli</button>
</nav>

<div id="home" class="page active">
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="particles" id="particles"></div>
    <div class="hero-content">
      <h1 class="hero-title"><span class="line1">MANHWA</span><span class="line2">TRACKER</span></h1>
      <p class="hero-sub" id="hero-date"></p>
      <div class="hero-stats">
        <div class="hero-stat"><div class="hero-stat-num" id="stat-total">0</div><div class="hero-stat-label">Titoli</div></div>
        <div class="hero-stat"><div class="hero-stat-num" id="stat-unread">0</div><div class="hero-stat-label">Da Leggere</div></div>
        <div class="hero-stat"><div class="hero-stat-num" id="stat-hiatus">0</div><div class="hero-stat-label">In Pausa</div></div>
      </div>
    </div>
    <div class="scroll-hint">Scorri</div>
  </div>
  <div class="recent-strip">
    <h2>Ultime Uscite</h2>
    <div class="recent-scroll" id="recent-scroll"></div>
  </div>
</div>

<div id="reading" class="page">
  <div class="page-header">
    <div>
      <h1>Reading <span>List</span></h1>
      <p style="color:var(--muted);font-size:13px;margin-top:4px;" id="reading-subtitle"></p>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all',event)">Tutti</button>
        <button class="filter-btn" onclick="setFilter('unread',event)">Da Leggere</button>
        <button class="filter-btn" onclick="setFilter('active',event)">Attivi</button>
      </div>
      <button class="btn-primary" onclick="openAddModal()" style="padding:6px 16px;font-size:12px;">+ Aggiungi</button>
    </div>
  </div>
  <div class="manhwa-grid" id="manhwa-grid"></div>
</div>

<div id="calendario" class="page">
  <div class="page-header" style="background:linear-gradient(135deg,#d8eed8 0%,#e8f0e0 100%);">
    <h1>Calendario <span>Uscite</span></h1>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div id="sospesi" class="page">
  <div class="page-header" style="background:linear-gradient(135deg,#f0ede0 0%,#f8f4e8 100%);">
    <h1 style="color:var(--deep);">Sospesi & <span style="color:var(--coral);">Conclusi</span></h1>
  </div>
  <div class="sospesi-grid" id="sospesi-grid"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const BASE = window.BASE_PATH || '';
document.documentElement.style.setProperty('--bg-url', `url('${BASE}/bg.jpg')`);
const DAYS = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
let manhwaData = [];
let currentFilter = 'all';
let bulkResults = {};
let bulkES = null;

// ── API helpers ──────────────────────────────────────────────────────────────

async function apiFetch(path, opts = {}) {
  const r = await fetch(BASE + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}
const apiGet = path => apiFetch(path);
const apiPost = (path, body) => apiFetch(path, { method: 'POST', body });
const apiPut = (id, body) => apiFetch(`/api/manhwa/${id}`, { method: 'PUT', body });
const apiDelete = id => fetch(`${BASE}/api/manhwa/${id}`, { method: 'DELETE' });

// ── Cover helpers ─────────────────────────────────────────────────────────────

function effectiveCover(m) {
  if (m.cover_path) return BASE + '/covers/' + m.cover_path;
  return m.custom_cover || '';
}

async function loadAllCovers() {
  const missing = manhwaData.filter(m => !m.cover_path && !m.custom_cover);
  for (let i = 0; i < missing.length; i++) {
    const m = missing[i];
    try {
      const updated = await apiPost(`/api/covers/${m.id}/fetch`, {});
      const idx = manhwaData.findIndex(x => x.id === m.id);
      if (idx !== -1) manhwaData[idx] = updated;
      if (i % 5 === 4) renderAll();
    } catch {}
    await new Promise(r => setTimeout(r, 150));
  }
  renderAll();
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  try {
    manhwaData = await apiGet('/api/manhwa');
  } catch (e) {
    manhwaData = [];
  }
  renderHome();
  loadAllCovers();
}

// ── Particles ─────────────────────────────────────────────────────────────────

function initParticles() {
  const c = document.getElementById('particles');
  const colors = ['rgba(250,199,117,0.7)','rgba(93,202,165,0.6)','rgba(232,180,122,0.6)','rgba(250,246,237,0.5)'];
  for (let i = 0; i < 45; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const x = Math.random() * 100, dur = 7 + Math.random() * 13, delay = Math.random() * -18;
    const drift = (Math.random() - .5) * 180, size = 1.5 + Math.random() * 3;
    const col = colors[Math.floor(Math.random() * colors.length)];
    p.style.cssText = `left:${x}%;width:${size}px;height:${size}px;background:${col};--drift:${drift}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
    c.appendChild(p);
  }
}

// ── Routing ───────────────────────────────────────────────────────────────────

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    if ((id === 'home' && b.textContent === 'Home') ||
        (id === 'reading' && b.textContent === 'Reading') ||
        (id === 'calendario' && b.textContent === 'Calendario') ||
        (id === 'sospesi' && b.textContent === 'Sospesi'))
      b.classList.add('active');
  });
  renderPage(id);
}
function renderPage(id) {
  if (id === 'home') renderHome();
  if (id === 'reading') renderReading();
  if (id === 'calendario') renderCalendario();
  if (id === 'sospesi') renderSospesi();
}
function renderAll() {
  const a = document.querySelector('.page.active');
  if (a) renderPage(a.id);
}

// ── Emoji helper ──────────────────────────────────────────────────────────────

function emoji(m) {
  const t = m.title.toLowerCase();
  if (t.includes('skeleton') || t.includes('dungeon')) return '💀';
  if (t.includes('sword')) return '⚔️';
  if (t.includes('mage') || t.includes('archmage')) return '🔮';
  if (t.includes('goblin')) return '👺';
  if (t.includes('barbarian')) return '🪓';
  if (t.includes('demon')) return '👿';
  if (t.includes('martial') || t.includes('king')) return '👑';
  if (t.includes('necro')) return '💀';
  if (t.includes('solo') || t.includes('player')) return '🎮';
  if (t.includes('tutorial')) return '🏆';
  if (t.includes('restaurant')) return '🍜';
  return '📖';
}

// ── Render: Home ──────────────────────────────────────────────────────────────

function renderHome() {
  document.getElementById('hero-date').textContent = new Date()
    .toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' })
    .toUpperCase();
  const active = manhwaData.filter(m => m.status === 'active');
  document.getElementById('stat-total').textContent = active.length;
  document.getElementById('stat-unread').textContent = active
    .filter(m => m.last_ch > m.read_ch)
    .reduce((s, m) => s + (m.last_ch - m.read_ch), 0);
  document.getElementById('stat-hiatus').textContent = manhwaData.filter(m => m.status === 'hiatus').length;
  const sorted = [...active].sort((a, b) => (b.last_ch - b.read_ch) - (a.last_ch - a.read_ch));
  document.getElementById('recent-scroll').innerHTML = sorted.map(m => {
    const u = m.last_ch - m.read_ch;
    const cover = effectiveCover(m);
    return `<div class="recent-item" onclick="openLink('${m.main_link}')">
      <div class="recent-cover">${cover
        ? `<img src="${cover}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="no-cover-mini">${emoji(m)}</div>`}${u > 0 ? `<div class="new-badge">+${u}</div>` : ''}</div>
      <div class="recent-ch">Ch.${m.last_ch}</div>
    </div>`;
  }).join('');
}

// ── Render: Reading ───────────────────────────────────────────────────────────

function setFilter(f, ev) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (ev) ev.currentTarget.classList.add('active');
  renderReading();
}

function renderReading() {
  let data = manhwaData.filter(m => m.status !== 'completed');
  if (currentFilter === 'unread') data = data.filter(m => m.last_ch > m.read_ch);
  if (currentFilter === 'active') data = data.filter(m => m.status === 'active');
  document.getElementById('reading-subtitle').textContent =
    `${data.length} titoli · ${data.filter(m => m.status === 'active').length} attivi`;
  document.getElementById('manhwa-grid').innerHTML = data.map(m => {
    const unread = Math.max(0, m.last_ch - m.read_ch);
    const pct = m.last_ch > 0 ? Math.round((m.read_ch / m.last_ch) * 100) : 100;
    const cover = effectiveCover(m);
    return `<div class="manhwa-card ${m.status === 'hiatus' ? 'hiatus' : ''}" id="card-${m.id}">
      <div class="card-cover" onclick="openLink('${m.main_link}')" title="Apri sito">
        ${cover
          ? `<img src="${cover}" alt="${m.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="cover-placeholder" style="${cover ? 'display:none' : ''}"><span style="font-size:2rem">${emoji(m)}</span><span>${m.title.substring(0, 28)}</span></div>
        <div class="card-cover-overlay">🔗 Apri</div>
        ${unread > 0 ? `<div class="unread-badge">+${unread}</div>` : ''}
        <div class="day-badge">${(m.release_day || '').substring(0, 3)}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="card-chapters">
          <div class="ch-row"><span class="ch-label">Ultimo</span><span class="ch-num">Ch.${m.last_ch}</span></div>
          <div class="ch-row"><span class="ch-label">Letto</span><span class="ch-num read">Ch.${m.read_ch}</span></div>
        </div>
        <div class="ch-progress"><div class="ch-progress-bar" style="width:${pct}%"></div></div>
        <div class="card-actions">
          <button class="card-btn" onclick="openEditModal(${m.id})">✏ Edit</button>
          <button class="card-btn" onclick="quickRead(${m.id})">✓ Letto</button>
          <button class="card-btn ${m.status === 'hiatus' ? '' : 'pause'}" onclick="toggleHiatus(${m.id})">${m.status === 'hiatus' ? '▶ Riprendi' : '⏸ Pausa'}</button>
        </div>
      </div>
    </div>`;
  }).join('') + `<div class="add-btn" onclick="openAddModal()"><span style="font-size:2rem">+</span>Aggiungi Titolo</div>`;
}

// ── Render: Calendario ────────────────────────────────────────────────────────

function renderCalendario() {
  const grid = document.getElementById('cal-grid');
  const dm = {};
  DAYS.forEach(d => dm[d] = []);
  const variabile = [];
  manhwaData.filter(m => m.status === 'active').forEach(m => {
    const d = m.release_day;
    if (dm[d]) dm[d].push(m);
    else if (d === 'Lun/Mar') { dm['Lunedì'].push(m); dm['Martedì'].push(m); }
    else if (d === 'Gio/Ven') { dm['Giovedì'].push(m); dm['Venerdì'].push(m); }
    else variabile.push(m);
  });
  grid.innerHTML = DAYS.map(day => `
    <div class="cal-day">
      <div class="cal-day-name">${day}</div>
      ${(dm[day] || []).map(m => {
        const cover = effectiveCover(m);
        return `<div class="cal-card" onclick="openLink('${m.main_link}')">
          <div class="cal-mini-cover">${cover ? `<img src="${cover}" loading="lazy" alt="">` : ''}</div>
          <div><div class="cal-card-title">${m.title.split(' ').slice(0, 4).join(' ')}</div><div class="cal-card-ch">Ch.${m.last_ch}</div></div>
        </div>`;
      }).join('')}
    </div>`).join('');
  if (variabile.length) {
    const extra = document.createElement('div');
    extra.style.cssText = 'grid-column:1/-1;background:#edf5f0;padding:.75rem;border-top:1px solid rgba(29,158,117,.12)';
    extra.innerHTML = `<div style="font-family:Cinzel,serif;font-size:10px;letter-spacing:2px;color:var(--teal);text-transform:uppercase;margin-bottom:.5rem;">Settimanale / Variabile</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">${variabile.map(m => {
        const cover = effectiveCover(m);
        return `<div class="cal-card" style="flex:0 0 auto;width:140px;" onclick="openLink('${m.main_link}')">
          <div class="cal-mini-cover">${cover ? `<img src="${cover}" loading="lazy" alt="">` : ''}</div>
          <div><div class="cal-card-title">${m.title.split(' ').slice(0, 3).join(' ')}</div><div class="cal-card-ch">Ch.${m.last_ch}</div></div>
        </div>`;
      }).join('')}</div>`;
    grid.appendChild(extra);
  }
}

// ── Render: Sospesi ───────────────────────────────────────────────────────────

function renderSospesi() {
  const list = manhwaData.filter(m => m.status === 'hiatus' || m.status === 'completed');
  const grid = document.getElementById('sospesi-grid');
  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--muted);font-family:Cinzel,serif;letter-spacing:2px;text-transform:uppercase;font-size:14px;">Nessun titolo sospeso</div>`;
    return;
  }
  grid.innerHTML = list.map(m => {
    const cover = effectiveCover(m);
    return `<div class="sospesi-card">
      <div class="sospesi-cover" onclick="openLink('${m.main_link}')">${cover ? `<img src="${cover}" loading="lazy" alt="">` : emoji(m)}</div>
      <div style="flex:1;min-width:0;">
        <div class="sospesi-title">${m.title}</div>
        <div class="sospesi-meta">Ultimo: Ch.${m.last_ch} · Letto: Ch.${m.read_ch}</div>
        <div class="sospesi-meta">${m.release_day}</div>
        <div class="status-pill ${m.status}">${m.status === 'hiatus' ? 'In Pausa' : 'Completato'}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${m.status === 'hiatus' ? `<button class="card-btn" style="flex:0 0 auto;font-size:11px;padding:5px 12px;" onclick="toggleHiatus(${m.id})">▶ Riprendi</button>` : ''}
          <button class="card-btn" style="font-size:11px;padding:5px 12px;" onclick="openEditModal(${m.id})">✏ Edit</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Quick actions ─────────────────────────────────────────────────────────────

async function quickRead(id) {
  const m = manhwaData.find(x => x.id === id);
  if (!m) return;
  try {
    const updated = await apiPut(id, { read_ch: m.last_ch });
    Object.assign(m, updated);
    renderAll();
    toast(`✓ ${m.title.split(' ').slice(0, 3).join(' ')} letto`);
  } catch { toast('Errore durante il salvataggio'); }
}

async function toggleHiatus(id) {
  const m = manhwaData.find(x => x.id === id);
  if (!m) return;
  const newStatus = m.status === 'hiatus' ? 'active' : 'hiatus';
  try {
    const updated = await apiPut(id, { status: newStatus });
    Object.assign(m, updated);
    renderAll();
    toast(newStatus === 'hiatus' ? '⏸ In pausa' : '▶ Ripreso');
  } catch { toast('Errore durante il salvataggio'); }
}

// ── Add modal ─────────────────────────────────────────────────────────────────

function openAddModal() {
  showModal(`<h2>➕ Aggiungi Manhwa</h2>
    <div class="modal-field"><label>Titolo</label><input id="f-title" placeholder="Es: Solo Leveling"/></div>
    <div class="modal-field"><label>Ultimo Cap.</label><input id="f-lastch" type="number" value="1"/></div>
    <div class="modal-field"><label>Letto fino a</label><input id="f-readch" type="number" value="1"/></div>
    <div class="modal-field"><label>Giorno Uscita</label><select id="f-day">${['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica','Lun/Mar','Gio/Ven','Settimanale','Variabile'].map(d => `<option>${d}</option>`).join('')}</select></div>
    <div class="modal-field"><label>Link Principale</label><input id="f-link" placeholder="https://..."/></div>
    <div class="modal-field"><label>Cover URL (opzionale)</label><input id="f-cover" placeholder="https://..."/></div>
    <div class="modal-field"><label>Link Alternativi (uno per riga)</label><textarea id="f-altlinks" placeholder="https://kingofshojo.com" style="min-height:60px;"></textarea></div>
    <div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Annulla</button><button class="btn-primary" onclick="addManhwa()">Aggiungi</button></div>`);
}

async function addManhwa() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Inserisci un titolo!'); return; }
  const last_ch = parseInt(document.getElementById('f-lastch').value) || 1;
  const read_ch = parseInt(document.getElementById('f-readch').value) || 1;
  const release_day = document.getElementById('f-day').value;
  const main_link = document.getElementById('f-link').value.trim();
  const custom_cover = document.getElementById('f-cover').value.trim();
  const alt_links = document.getElementById('f-altlinks').value.split('\n').map(s => s.trim()).filter(Boolean);
  try {
    const record = await apiPost('/api/manhwa', { title, last_ch, read_ch, release_day, main_link, alt_links, status: 'active', custom_cover });
    manhwaData.push(record);
    closeModal();
    renderAll();
    toast(`✓ ${title.split(' ').slice(0, 3).join(' ')} aggiunto!`);
    if (!custom_cover) {
      apiPost(`/api/covers/${record.id}/fetch`, {}).then(updated => {
        const idx = manhwaData.findIndex(x => x.id === record.id);
        if (idx !== -1) manhwaData[idx] = updated;
        renderAll();
      }).catch(() => {});
    }
  } catch { toast('Errore durante il salvataggio'); }
}

// ── Edit modal ────────────────────────────────────────────────────────────────

function openEditModal(id) {
  const m = manhwaData.find(x => x.id === id);
  if (!m) return;
  const unread = Math.max(0, m.last_ch - m.read_ch);
  const cover = effectiveCover(m);
  showModal(`<h2>✏ ${m.title.split(' ').slice(0, 4).join(' ')}</h2>
    <div style="display:flex;gap:1rem;margin-bottom:1rem;align-items:flex-start;">
      ${cover
        ? `<img src="${cover}" style="width:60px;height:85px;object-fit:cover;border-radius:5px;border:1px solid rgba(29,158,117,.25);flex-shrink:0;">`
        : `<div style="width:60px;height:85px;background:#c8e8d8;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;">${emoji(m)}</div>`}
      <div style="flex:1;"><div class="modal-field" style="margin:0;"><label>Cover URL personalizzata</label><input id="e-cover" value="${m.custom_cover || ''}" placeholder="Incolla URL immagine..."/></div></div>
    </div>
    <div class="modal-field"><label>Ultimo Cap. Uscito</label><input id="e-lastch" type="number" value="${m.last_ch}"/></div>
    <div class="modal-field"><label>Letto fino a${unread > 0 ? ` — <span style="color:var(--coral)">+${unread} da leggere!</span>` : ''}</label><input id="e-readch" type="number" value="${m.read_ch}" min="0"/></div>
    <div class="modal-field"><label>Giorno Uscita</label><select id="e-day">${['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica','Lun/Mar','Gio/Ven','Settimanale','Variabile'].map(d => `<option${d === m.release_day ? ' selected' : ''}>${d}</option>`).join('')}</select></div>
    <div class="modal-field"><label>Link Principale</label><input id="e-link" value="${m.main_link}"/></div>
    <div class="modal-field"><label>Link Alternativi</label><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">
      ${m.alt_links.map((l, i) => {
        let host = '';
        try { host = new URL(l.startsWith('http') ? l : 'https://' + l).hostname.replace('www.', ''); } catch { host = l; }
        return `<span class="link-pill" onclick="openLink('${l}')">${host}</span><span class="link-pill del" onclick="removeLink(${id},${i})">✕</span>`;
      }).join('')}
      <input id="e-newlink" placeholder="+ nuovo link" style="border:none;background:transparent;color:var(--ink);font-size:13px;min-width:120px;padding:3px 8px;outline:none;" onkeydown="if(event.key==='Enter')addLink(${id})">
    </div></div>
    <div class="modal-field"><label>Stato</label><select id="e-status">
      <option value="active"${m.status === 'active' ? ' selected' : ''}>Attivo</option>
      <option value="hiatus"${m.status === 'hiatus' ? ' selected' : ''}>In Pausa</option>
      <option value="completed"${m.status === 'completed' ? ' selected' : ''}>Completato</option>
    </select></div>
    <div class="modal-actions">
      <button class="btn-secondary" style="color:var(--coral);border-color:rgba(216,90,48,.3);" onclick="deleteManhwa(${id})">🗑 Rimuovi</button>
      <button class="btn-secondary" onclick="closeModal()">Annulla</button>
      <button class="btn-primary" onclick="saveEdit(${id})">Salva</button>
    </div>`);
}

async function saveEdit(id) {
  const m = manhwaData.find(x => x.id === id);
  if (!m) return;
  const lastCh = parseInt(document.getElementById('e-lastch').value) || m.last_ch;
  const newCustomCover = document.getElementById('e-cover').value.trim();
  const fields = {
    last_ch: lastCh,
    read_ch: Math.min(parseInt(document.getElementById('e-readch').value) || m.read_ch, lastCh),
    release_day: document.getElementById('e-day').value,
    main_link: document.getElementById('e-link').value.trim(),
    status: document.getElementById('e-status').value,
    custom_cover: newCustomCover
  };
  try {
    const updated = await apiPut(id, fields);
    Object.assign(m, updated);
    closeModal();
    renderAll();
    toast('✓ Salvato');
    // If custom cover URL changed, try to download it
    if (newCustomCover && newCustomCover !== m.cover_path) {
      apiPost(`/api/covers/${id}/custom`, { url: newCustomCover }).then(res => {
        Object.assign(m, res);
        renderAll();
      }).catch(() => {});
    }
  } catch { toast('Errore durante il salvataggio'); }
}

async function removeLink(id, idx) {
  const m = manhwaData.find(x => x.id === id);
  if (!m) return;
  m.alt_links.splice(idx, 1);
  try {
    await apiPut(id, { alt_links: m.alt_links });
  } catch {}
  openEditModal(id);
}

async function addLink(id) {
  const m = manhwaData.find(x => x.id === id);
  const val = document.getElementById('e-newlink').value.trim();
  if (!val || !m) return;
  m.alt_links.push(val.startsWith('http') ? val : 'https://' + val);
  try {
    await apiPut(id, { alt_links: m.alt_links });
  } catch {}
  openEditModal(id);
}

async function deleteManhwa(id) {
  if (!confirm('Rimuovere?')) return;
  manhwaData = manhwaData.filter(x => x.id !== id);
  try { await apiDelete(id); } catch {}
  closeModal();
  renderAll();
  toast('🗑 Rimosso');
}

// ── Bulk update ───────────────────────────────────────────────────────────────

function openBulkUpdate() {
  const active = manhwaData.filter(m => m.status === 'active');
  bulkResults = {};
  showModal(buildBulkHTML(active, false, 0));
}

function buildBulkHTML(active, running, done) {
  const total = active.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const rows = active.map(m => {
    const r = bulkResults[m.id];
    let stHtml = '', rowCls = '', inpCls = '';
    if (!r) stHtml = `<span class="bulk-status" style="color:var(--muted);">—</span>`;
    else if (r.loading) stHtml = `<span class="bulk-status spin">⟳</span>`;
    else if (r.ok && r.ch != null) {
      const isNew = r.ch > m.last_ch;
      stHtml = `<span class="bulk-status ok">${isNew ? '▲ ' : '✓ '}Ch.${r.ch}</span>`;
      rowCls = isNew ? 'updated' : '';
      inpCls = isNew ? 'changed' : '';
    } else {
      stHtml = `<span class="bulk-status fail">—</span>`;
      rowCls = 'failed';
    }
    const cover = effectiveCover(m);
    const val = (r && r.ok && r.ch) ? r.ch : m.last_ch;
    return `<div class="bulk-row ${rowCls}" id="brow-${m.id}">
      <div class="bulk-mini-cover">${cover ? `<img src="${cover}" loading="lazy" alt="">` : ''}</div>
      <span class="bulk-title">${m.title}</span>
      <input type="number" class="bulk-ch-input ${inpCls}" id="bch-${m.id}" value="${val}" min="1">
      ${stHtml}
    </div>`;
  }).join('');
  return `<h2>⟳ Aggiorna Capitoli</h2>
    <div class="bulk-summary" id="bulk-summary">${running ? `Scansione... ${done}/${total}` : total + ' serie attive — clicca Avvia'}</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="bulk-progress" style="width:${pct}%"></div></div>
    <div style="max-height:52vh;overflow-y:auto;margin-bottom:1rem;">${rows}</div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeBulk()">Chiudi</button>
      ${running
        ? `<button class="btn-secondary" onclick="stopBulk()">⏹ Ferma</button>`
        : `<button class="btn-primary" id="bulk-start-btn" onclick="startBulkScrape()">▶ Avvia Scraping</button>`}
      <button class="btn-primary" onclick="applyBulkChanges()" style="background:var(--green);">✓ Salva</button>
    </div>`;
}

function stopBulk() {
  if (bulkES) { bulkES.close(); bulkES = null; }
}
function closeBulk() {
  stopBulk();
  closeModal();
}

function startBulkScrape() {
  const active = manhwaData.filter(m => m.status === 'active');
  bulkResults = {};
  active.forEach(m => bulkResults[m.id] = { loading: true, ok: false, ch: null });
  document.getElementById('modal-content').innerHTML = buildBulkHTML(active, true, 0);
  let done = 0;

  stopBulk();
  bulkES = new EventSource(BASE + '/api/scrape/bulk');

  bulkES.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'progress') {
      if (data.status === 'running') {
        bulkResults[data.id] = { loading: true, ok: false, ch: null };
        const row = document.getElementById(`brow-${data.id}`);
        if (row) row.querySelector('[class*="bulk-status"]').outerHTML = `<span class="bulk-status spin">⟳</span>`;
      } else {
        done++;
        const m = manhwaData.find(x => x.id === data.id);
        if (data.error) {
          bulkResults[data.id] = { loading: false, ok: false, ch: null };
        } else {
          bulkResults[data.id] = { loading: false, ok: true, ch: data.chapter };
          if (m && data.chapter > m.last_ch) m.last_ch = data.chapter;
        }
        const row = document.getElementById(`brow-${data.id}`);
        if (row) {
          const r = bulkResults[data.id];
          if (r.ok && r.ch != null) {
            const isNew = data.updated;
            row.className = `bulk-row ${isNew ? 'updated' : ''}`;
            const inp = document.getElementById(`bch-${data.id}`);
            if (inp) { inp.value = r.ch; if (isNew) inp.classList.add('changed'); }
            row.querySelector('[class*="bulk-status"]').outerHTML = `<span class="bulk-status ok">${isNew ? '▲ ' : '✓ '}Ch.${r.ch}</span>`;
          } else {
            row.className = 'bulk-row failed';
            row.querySelector('[class*="bulk-status"]').outerHTML = `<span class="bulk-status fail">—</span>`;
          }
        }
        const prog = document.getElementById('bulk-progress');
        if (prog) prog.style.width = Math.round((done / active.length) * 100) + '%';
        const summ = document.getElementById('bulk-summary');
        if (summ) summ.textContent = `Scansione... ${done}/${active.length}`;
      }
    }
    if (data.type === 'done') {
      bulkES.close(); bulkES = null;
      const summ = document.getElementById('bulk-summary');
      if (summ) summ.textContent = `Completato — ${data.updated} aggiornati, ${data.errors} errori`;
      const btn = document.getElementById('bulk-start-btn');
      if (btn) btn.textContent = '⟳ Riesegui';
      // Refresh full list from server
      apiGet('/api/manhwa').then(d => { manhwaData = d; }).catch(() => {});
    }
  };

  bulkES.onerror = () => {
    if (bulkES) { bulkES.close(); bulkES = null; }
    const summ = document.getElementById('bulk-summary');
    if (summ) summ.textContent = 'Connessione interrotta';
  };
}

async function applyBulkChanges() {
  const active = manhwaData.filter(m => m.status === 'active');
  let changed = 0;
  const promises = [];
  active.forEach(m => {
    const inp = document.getElementById(`bch-${m.id}`);
    if (inp) {
      const val = parseInt(inp.value);
      if (val && val > 0 && val !== m.last_ch) {
        m.last_ch = val;
        changed++;
        promises.push(apiPut(m.id, { last_ch: val }).catch(() => {}));
      }
    }
  });
  await Promise.all(promises);
  closeModal();
  renderAll();
  toast(changed > 0 ? `✓ ${changed} serie aggiornate!` : 'Nessuna modifica');
}

// ── Modal & utils ─────────────────────────────────────────────────────────────

function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  stopBulk();
  document.getElementById('modal-overlay').classList.remove('open');
}
function openLink(url) { if (url && url.startsWith('http')) window.open(url, '_blank'); }

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────

initParticles();
init();
</script>
</body>
</html>
